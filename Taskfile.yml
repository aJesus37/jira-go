# https://taskfile.dev
version: '3'

vars:
  BINARY_NAME: jira
  BUILD_DIR: ./build
  VERSION:
    sh: git describe --tags --always --dirty 2>/dev/null || echo "dev"
  COMMIT:
    sh: git rev-parse --short HEAD 2>/dev/null || echo "unknown"
  BUILD_DATE:
    sh: date -u +"%Y-%m-%dT%H:%M:%SZ"
  LDFLAGS: >
    -X github.com/user/jira-go/internal/commands.version={{.VERSION}}
    -X github.com/user/jira-go/internal/commands.commit={{.COMMIT}}
    -X github.com/user/jira-go/internal/commands.buildDate={{.BUILD_DATE}}

tasks:
  default:
    cmds:
      - task: build

  build:
    desc: Build the binary
    cmds:
      - mkdir -p {{.BUILD_DIR}}
      - go build -ldflags "{{.LDFLAGS}}" -o {{.BUILD_DIR}}/{{.BINARY_NAME}} ./cmd/jira
    sources:
      - "**/*.go"
      - go.mod
      - go.sum
    generates:
      - "{{.BUILD_DIR}}/{{.BINARY_NAME}}"

  test:
    desc: Run all tests
    cmds:
      - go test -v ./...

  clean:
    desc: Clean build artifacts
    cmds:
      - rm -rf {{.BUILD_DIR}}

  install:
    desc: Install binary to GOPATH/bin
    deps: [build]
    cmds:
      - cp {{.BUILD_DIR}}/{{.BINARY_NAME}} $(go env GOPATH)/bin/

  lint:
    desc: Run linter
    cmds:
      - golangci-lint run

  dev:
    desc: Run in development mode
    cmds:
      - go run ./cmd/jira

  deps:
    desc: Download and tidy dependencies
    cmds:
      - go mod tidy
      - go mod download

  fmt:
    desc: Format Go code
    cmds:
      - go fmt ./...

  check:
    desc: Run all checks (fmt, lint, test)
    cmds:
      - task: fmt
      - task: lint
      - task: test

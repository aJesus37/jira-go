version: 2

project_name: jira

before:
  hooks:
    - go mod tidy

builds:
  - id: jira
    main: ./cmd/jira
    binary: jira
    ldflags:
      - -s -w
      - -X github.com/aJesus37/jira-go/internal/commands.version={{.Version}}
      - -X github.com/aJesus37/jira-go/internal/commands.commit={{.Commit}}
      - -X github.com/aJesus37/jira-go/internal/commands.buildDate={{.Date}}
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ignore:
      - goos: linux
        goarch: arm64
      - goos: windows
        goarch: arm64

archives:
  - id: default
    name_template: "jira_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats: [zip]
    files:
      - LICENSE
      - README.md

checksum:
  name_template: checksums.txt
  algorithm: sha256

changelog:
  sort: asc
  use: github

release:
  github:
    owner: aJesus37
    name: jira-go
